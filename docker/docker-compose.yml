services:
  legacy-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: legacy-sql-onprem
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - legacy-sql-data:/var/opt/mssql
      - ./init:/init:ro

volumes:
  legacy-sql-data: